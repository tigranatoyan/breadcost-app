# ── Functional test profile ───────────────────────────────────────────────────
# Use in-memory H2 so tests are isolated and fast.
spring.datasource.url=jdbc:h2:mem:breadcost_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Disable Flyway for tests — H2 schema is auto-generated by Hibernate
spring.flyway.enabled=false

spring.h2.console.enabled=false

spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC
spring.jackson.default-property-inclusion=non_null

breadcost.jwt.secret=breadcost-super-secret-key-for-jwt-signing-32bytes!!
breadcost.jwt.expiry-ms=86400000

breadcost.event-store.in-memory=true
breadcost.event-store.initial-ledger-seq=1000
breadcost.projection.lag-warning-seconds=10
breadcost.projection.async-enabled=false

# Disable Redis/caching in tests
spring.cache.type=none
spring.data.redis.host=localhost
spring.data.redis.port=0

# Disable RabbitMQ in tests
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration

logging.level.com.breadcost=WARN
logging.level.org.springframework.security=WARN
