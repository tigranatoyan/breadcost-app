# BreadCost Application Configuration

# Server Configuration
server.port=8080
spring.application.name=breadcost-app

# ── PostgreSQL (default / production) ─────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/breadcost
spring.datasource.username=breadcost
spring.datasource.password=breadcost_dev
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── Flyway ────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Jackson Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC
spring.jackson.default-property-inclusion=non_null

# Logging
logging.level.com.breadcost=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=WARN

# JWT Configuration
breadcost.jwt.secret=breadcost-super-secret-key-for-jwt-signing-32bytes!!
breadcost.jwt.expiry-ms=86400000

# BreadCost Specific Configuration
breadcost.event-store.in-memory=true
breadcost.event-store.initial-ledger-seq=1000
breadcost.projection.lag-warning-seconds=10
breadcost.projection.async-enabled=true

# ── Redis (activated with spring.profiles.active=redis) ───────────────────
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2000
