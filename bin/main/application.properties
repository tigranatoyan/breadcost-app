# BreadCost Application Configuration

# Server Configuration
server.port=8080
spring.application.name=breadcost-app

# ── PostgreSQL (default / production) ─────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/breadcost
spring.datasource.username=breadcost
spring.datasource.password=breadcost_dev
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── Flyway ────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Jackson Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC
spring.jackson.default-property-inclusion=non_null

# Logging
logging.level.com.breadcost=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=WARN

# JWT Configuration
breadcost.jwt.secret=breadcost-super-secret-key-for-jwt-signing-32bytes!!
breadcost.jwt.expiry-ms=86400000

# BreadCost Specific Configuration
breadcost.event-store.in-memory=true
breadcost.event-store.initial-ledger-seq=1000
breadcost.projection.lag-warning-seconds=10
breadcost.projection.async-enabled=true

# ── Redis (activated with spring.profiles.active=redis) ───────────────────
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2000

# ── RabbitMQ (activated with spring.profiles.active=rabbit) ───────────────
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=breadcost
spring.rabbitmq.password=breadcost_dev
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.max-attempts=3
spring.rabbitmq.listener.simple.retry.initial-interval=1000
spring.rabbitmq.listener.simple.retry.multiplier=2.0

# ── Email (activated with spring.profiles.active=mail) ────────────────────
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
breadcost.mail.from=${MAIL_FROM:noreply@breadcost.app}
breadcost.mail.enabled=${MAIL_ENABLED:false}
