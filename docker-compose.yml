version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: breadcost-db
    environment:
      POSTGRES_DB: breadcost
      POSTGRES_USER: breadcost
      POSTGRES_PASSWORD: breadcost_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U breadcost"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
