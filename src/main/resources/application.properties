# BreadCost Application Configuration

# Server Configuration
server.port=8080
spring.application.name=breadcost-app

# H2 Database Configuration (for projections/read models)
spring.datasource.url=jdbc:h2:mem:breadcost
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# H2 Console (for development)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA Configuration
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Jackson Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC
spring.jackson.default-property-inclusion=non_null

# Logging
logging.level.com.breadcost=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Security (Basic for demo - disable CSRF for API testing)
spring.security.user.name=admin
spring.security.user.password=admin
spring.security.user.roles=Admin

# BreadCost Specific Configuration
breadcost.event-store.in-memory=true
breadcost.event-store.initial-ledger-seq=1000
breadcost.projection.lag-warning-seconds=10
breadcost.projection.async-enabled=true
