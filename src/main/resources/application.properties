# BreadCost Application Configuration

# Server Configuration
server.port=8080
spring.application.name=breadcost-app

# H2 Database Configuration — file mode so data survives restart
spring.datasource.url=jdbc:h2:file:./data/breadcost;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# H2 Console (for development)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Jackson Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC
spring.jackson.default-property-inclusion=non_null

# Logging
logging.level.com.breadcost=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=WARN

# JWT Configuration
breadcost.jwt.secret=breadcost-super-secret-key-for-jwt-signing-32bytes!!
breadcost.jwt.expiry-ms=86400000

# BreadCost Specific Configuration
breadcost.event-store.in-memory=true
breadcost.event-store.initial-ledger-seq=1000
breadcost.projection.lag-warning-seconds=10
breadcost.projection.async-enabled=true
